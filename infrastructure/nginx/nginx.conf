worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Use Docker's internal DNS resolver to dynamically resolve IPs
    # valid=10s sets the cache time to 10 seconds to catch restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # Define variables to force dynamic DNS resolution
        set $springboot "http://spring-boot:8080";
        set $goedge "http://go-edge:9090";
        set $pythonai "http://python-ai:8000";

        # Add these to your existing server block
        
        # Route to Go Edge Health
        location /api/go/health {
            # Note: This rewrites the path so Go sees it as /health
            proxy_pass http://go-edge:9090/health; 
            proxy_set_header Host $host;
        }

        # Route to Python AI Health
        location /api/python/health {
            # Note: This rewrites the path so Python sees it as /health
            proxy_pass http://python-ai:8000/health;
            proxy_set_header Host $host;
        }

        # Health routing for the Spring Boot actuator (if not already handled)
        location /api/springboot/health {
            proxy_pass $springboot/actuator/health;
            proxy_set_header Host $host;
        }
        
        location /api/v1/test/ {
            proxy_pass $springboot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/auth/ {
            proxy_pass $springboot;
            proxy_set_header Host $host;
        }

        location /api/v1/ai/ {
            proxy_pass $springboot;
            proxy_set_header Host $host;
        }

        location /api/v1/analytics/ {
            proxy_pass $goedge;
            proxy_set_header Host $host;
        }

        location /ws {
            proxy_pass $goedge;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /actuator/ {
            proxy_pass $springboot;
            proxy_set_header Host $host;
        }

        # Catch-all for other Spring Boot APIs
        location /api/v1/ {
            proxy_pass $springboot;
            proxy_set_header Host $host;
        }
    }
}