worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # ─── Upstream servers ───────────────────────────
    upstream spring_boot {
        server spring-boot:8080;
    }

    upstream go_edge {
        server go-edge:9090;
    }

    upstream python_ai {
        server python-ai:8000;
    }

    # ─── Rate limiting zones ────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        # Max request body (for ID card uploads)
        client_max_body_size 5M;

        # ─── Health check ───────────────────────────
        location /health {
            proxy_pass http://go_edge/health;
        }

        # ─── WebSocket connections ──────────────────
        location /ws {
            proxy_pass http://go_edge;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ─── SSE events ────────────────────────────
        location /events/ {
            proxy_pass http://go_edge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }

        # ─── AI endpoints → Python ─────────────────
        location /api/v1/ai/ {
            proxy_pass http://python_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 30;
        }

        # ─── Analytics → Go ────────────────────────
        location /api/v1/analytics/ {
            proxy_pass http://go_edge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Audit logs → Go ───────────────────────
        location /api/v1/admin/audit/ {
            proxy_pass http://go_edge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Notifications → Go ────────────────────
        location /api/v1/notifications/ {
            proxy_pass http://go_edge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Auth endpoints (rate limited) ──────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://spring_boot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── All other API → Spring Boot ───────────
        location /api/v1/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://spring_boot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Metrics → Go (Prometheus scrape) ──────
        location /metrics {
            proxy_pass http://go_edge/metrics;
        }

        # ─── Actuator → Spring Boot ────────────────
        location /actuator/ {
            proxy_pass http://spring_boot;
        }
    }
}
