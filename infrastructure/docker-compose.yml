
services:
  # ============================================
  # NGINX API GATEWAY
  # ============================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      spring-boot:
        condition: service_healthy
      go-edge:
        condition: service_started
      python-ai:
        condition: service_started
    networks:
      - univent-net

  # ============================================
  # APPLICATION SERVICES
  # ============================================
  spring-boot:
    build:
      context: ../Backend/Springboot/Univent-Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://postgres:5432/univent
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_s3cr3t}
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-SCRAM-SHA-256}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION=900000
      - JWT_REFRESH_EXPIRATION=604800000
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=univent-id-cards
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      - APP_EMAIL_SALT_PEPPER=${APP_EMAIL_SALT_PEPPER}
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - SERVER_PORT=8080
      - AI_WORKER_URL=http://python-ai:8000
      - INTERNAL_SHARED_SECRET=${INTERNAL_SHARED_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - univent-net

  go-edge:
    build:
      context: ../Backend/Go/edge-service
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      - PORT=9090
      - POSTGRES_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/univent?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_s3cr3t}@redis:6379/0
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-SCRAM-SHA-256}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_BOOT_URL=http://spring-boot:8080
      - PYTHON_AI_URL=http://python-ai:8000
      - ENVIRONMENT=docker
      - INTERNAL_SHARED_SECRET=${INTERNAL_SHARED_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - univent-net

  python-ai:
    build:
      context: ../Backend/Python/ai-worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${AI_WORKER_LOG_LEVEL:-INFO}
      - POSTGRES_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/univent
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-SCRAM-SHA-256}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INTERNAL_SHARED_SECRET=${INTERNAL_SHARED_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/ready"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - univent-net

  # ============================================
  # DATA STORES
  # ============================================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: univent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=200"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - univent-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_s3cr3t}"]
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_s3cr3t}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - univent-net

  # ============================================
  # KAFKA (KRaft mode - no Zookeeper)
  # ============================================
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - univent-net

  # ============================================
  # VECTOR DATABASE
  # ============================================
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image does not include wget/curl; use process check for liveness
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - univent-net

  # ============================================
  # OBJECT STORAGE
  # ============================================
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - univent-net

  # ============================================
  # MONITORING (Optional - start with: docker compose --profile monitoring up)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - univent-net
    profiles:
      - monitoring

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - univent-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles:
      - monitoring

  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - univent-net
    profiles:
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/univent?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - univent-net
    profiles:
      - monitoring

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_s3cr3t}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - univent-net
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - univent-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  qdrant_data:
  minio_data:
  grafana_data:
  loki_data:

networks:
  univent-net:
    driver: bridge
