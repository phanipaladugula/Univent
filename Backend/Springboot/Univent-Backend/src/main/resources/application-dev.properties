# ================================================
# DEV PROFILE (activated when spring.profiles.active=dev)
# All values come from .env file via ${VAR} syntax
# ================================================

# Application name
spring.application.name=univent-backend

# ─── Datasource ───────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.show-sql=true

# ─── Flyway ───────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ─── Redis ────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.repositories.enabled=true

# ─── Mail ─────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Server ───────────────────────────────────────────
server.port=${SERVER_PORT}

# ─── JWT ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION}

# ─── MinIO ────────────────────────────────────────────
minio.endpoint=${MINIO_ENDPOINT}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET}

# ─── Encryption ──────────────────────────────────────
encryption.secret=${ENCRYPTION_SECRET}

# ─── Kafka ────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BROKERS}

# ─── Logging (verbose in dev) ─────────────────────────
logging.level.com.univent=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG