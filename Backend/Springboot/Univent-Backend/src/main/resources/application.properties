# Application name
spring.application.name=univent-backend

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/univent}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Phani@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate - Use 'update' for now to let Hibernate create tables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.show-sql=true

# Flyway - Disable for now (Hibernate will handle schema)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Redis - Disabled
spring.data.redis.repositories.enabled=false

